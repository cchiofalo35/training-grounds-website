<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --steel: #B0B5B8;
    --charcoal: #1E1E1E;
    --dark-grey: #2A2A2A;
    --mid-grey: #3D3D3D;
    --light-grey: #F2F2F0;
    --off-white: #FAFAF8;
    --warm-accent: #C9A87C;
    --warm-accent-light: #E0CEAE;
    --soft-white: #F7F5F2;
    --text-dark: #1A1A1A;
    --text-body: #4A4A4A;
    --text-muted: #7A7A7A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--off-white);
    color: var(--text-body);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(30, 30, 30, 0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-inner {
    max-width: 1240px; margin: 0 auto; padding: 14px 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo img { height: 38px; opacity: 0.95; transition: opacity 0.3s; }
  .nav-logo img:hover { opacity: 1; }
  .nav-links {
    display: flex; align-items: center; gap: 28px; list-style: none;
  }
  .nav-links a {
    text-decoration: none; color: var(--steel); font-size: 0.82rem;
    font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: #fff; }
  .nav-links a.active { color: var(--warm-accent); }
  .nav-cta {
    background: var(--warm-accent) !important; color: var(--charcoal) !important;
    padding: 10px 26px !important; border-radius: 6px !important;
    font-weight: 700 !important; transition: all 0.3s !important;
  }
  .nav-cta:hover { background: #fff !important; transform: translateY(-1px); }
  .mobile-menu-btn {
    display: none; flex-direction: column; gap: 5px;
    background: none; border: none; cursor: pointer; padding: 8px;
  }
  .mobile-menu-btn span {
    width: 22px; height: 2px; background: var(--steel);
    border-radius: 1px; transition: all 0.3s;
  }

  .page-header {
    padding: 160px 40px 80px;
    background: var(--charcoal);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: ''; position: absolute; top: -40%; right: -15%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,124,0.06) 0%, transparent 70%);
  }
  .page-header .section-label {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--warm-accent); margin-bottom: 14px;
  }
  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 4rem;
    font-weight: 400; color: #fff; line-height: 1;
    letter-spacing: 0.02em; position: relative; z-index: 1;
  }
  .page-header p {
    font-size: 1.05rem; color: rgba(255,255,255,0.5);
    max-width: 650px; margin: 20px auto 0; font-weight: 300; line-height: 1.8;
    position: relative; z-index: 1;
  }

  section { padding: 90px 40px; }
  .section-label {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--warm-accent); margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem;
    font-weight: 400; color: var(--text-dark); line-height: 1;
    letter-spacing: 0.02em;
  }
  .section-title.light { color: #fff; }

  .coaches-grid {
    max-width: 1240px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 32px;
  }
  .coach-card {
    background: #fff; border-radius: 14px;
    overflow: hidden; border: 1px solid rgba(0,0,0,0.05);
    transition: all 0.4s;
  }
  .coach-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  }
  .coach-img {
    width: 100%; aspect-ratio: 1/1; overflow: hidden;
  }
  .coach-img img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.6s;
  }
  .coach-card:hover .coach-img img {
    transform: scale(1.05);
  }
  .coach-info {
    padding: 28px 28px 32px;
  }
  .role-badge {
    display: inline-block; background: var(--charcoal); color: var(--warm-accent);
    padding: 5px 14px; border-radius: 4px; font-size: 0.68rem;
    font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .coach-info h3 {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem;
    font-weight: 400; color: var(--text-dark); margin-bottom: 6px;
  }
  .disciplines {
    font-size: 0.78rem; color: var(--warm-accent); font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 14px;
  }
  .bio {
    font-size: 0.88rem; color: var(--text-muted); line-height: 1.75; font-weight: 300;
  }

  .btn-warm {
    display: inline-block; background: var(--warm-accent); color: var(--charcoal);
